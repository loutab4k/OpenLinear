name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  check:
    name: Go quality gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Check formatting
        run: |
          test -z "$(gofmt -l ./cmd ./internal)"

      - name: Test
        run: go test ./...

      - name: Vet
        run: go vet ./...

      - name: Secret scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate example data
        run: go run ./cmd/openlinear validate --data-dir examples/basic

      - name: Render smoke test
        run: go run ./cmd/openlinear render --data-dir examples/basic > /tmp/openlinear-render.txt
