name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Build and publish binaries
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Build binaries
        run: |
          mkdir -p dist
          for target in linux/amd64 linux/arm64 darwin/amd64 darwin/arm64; do
            goos="${target%/*}" goarch="${target#*/}"
            out="dist/openlinear-${GITHUB_REF_NAME}-${goos}-${goarch}"
            GOOS="$goos" GOARCH="$goarch" CGO_ENABLED=0 \
              go build -trimpath -ldflags "-s -w -X main.version=${GITHUB_REF_NAME}" \
              -o "$out" ./cmd/openlinear
          done
          (cd dist && shasum -a 256 openlinear-* > checksums.txt)

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" dist/* --generate-notes

      # Regenerates Formula/openlinear.rb in loutab4k/homebrew-tap.
      # Needs a TAP_GITHUB_TOKEN secret (PAT with push access to the tap);
      # skipped silently when the secret is not configured.
      - name: Update Homebrew tap
        env:
          TAP_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
        run: |
          if [ -z "$TAP_TOKEN" ]; then
            echo "TAP_GITHUB_TOKEN not set; skipping tap update"
            exit 0
          fi
          git clone "https://x-access-token:${TAP_TOKEN}@github.com/loutab4k/homebrew-tap.git" tap
          scripts/homebrew-formula.sh "$GITHUB_REF_NAME" dist/checksums.txt > tap/Formula/openlinear.rb
          cd tap
          git config user.name "openlinear-release"
          git config user.email "noreply@github.com"
          git add Formula/openlinear.rb
          git diff --cached --quiet || git commit -m "openlinear ${GITHUB_REF_NAME#v}"
          git push
